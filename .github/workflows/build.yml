name: Build APK
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install -g expo-cli
      - run: npm install
      - run: npm install expo-speech expo-speech-recognition expo-clipboard expo-sharing expo-vector-icons @react-native-async-storage/async-storage
      - run: npx expo export --platform android
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: dist
